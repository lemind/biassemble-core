name: Prompt Evaluation

on:
  pull_request:
    paths:
      - 'src/prompts/**'

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install
      - run: echo "GEMINI_API_KEY=mock" > .env && echo "AI_CORE_API_KEY=mock" >> .env
      - run: pnpm eval --min-evidence-grounded 0 --max-false-positive 1